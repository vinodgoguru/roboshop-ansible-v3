- name: copy mongodb repo
  copy:
    src: mongo.repo
    dest: /etc/yum.repos.d/mongo.repo
- name: install mongodb server
  package:
    name: mongodb-org
    state: present
- name: allow remote connections
  replace:
    path: /etc/mongod.conf
    regexp: '127.0.0.1'
    replace: '0.0.0.0'
- name: start and enable mongodb
  service:
    name: mongod
    state: started
    enabled: yes